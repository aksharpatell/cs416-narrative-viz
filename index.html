<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>The Rise and Fall of the Video Game Industry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://d3js.org/d3.v5.min.js"></script>
  <script src="https://rawcdn.githack.com/susielu/d3-annotation/master/d3-annotation.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Archivo:wght@600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'JetBrains Mono', monospace;
      margin: 0;
      padding: 40px 20px;
      background: #0d0f14;
      color: #e2e8f0;
    }
    #container {
      width: 900px;
      margin: 0 auto;
      background: #151922;
      padding: 30px;
      border: 1px solid #252b38;
      border-radius: 4px;
      position: relative;
    }
    /* scanline overlay - the signature */
    #container::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(74, 222, 128, 0.03) 0px,
        rgba(74, 222, 128, 0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      border-radius: 4px;
    }
    h1 {
      font-family: 'Archivo', sans-serif;
      font-weight: 800;
      font-size: 30px;
      letter-spacing: -0.02em;
      margin: 0 0 6px 0;
      color: #4ade80;
      text-shadow: 0 0 12px rgba(74, 222, 128, 0.4);
    }
    #subtitle {
      color: #64748b;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    #scene-title {
      font-family: 'Archivo', sans-serif;
      font-weight: 600;
      font-size: 18px;
      color: #e2e8f0;
      margin-bottom: 6px;
    }
    #scene-desc {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 18px;
      height: 40px;
      line-height: 1.5;
    }
    #nav { margin-top: 18px; display: flex; align-items: center; }
    button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 18px;
      margin-right: 10px;
      cursor: pointer;
      background: transparent;
      color: #4ade80;
      border: 1px solid #4ade80;
      border-radius: 2px;
      letter-spacing: 0.05em;
      transition: background 0.15s, color 0.15s;
    }
    button:hover:not(:disabled) {
      background: #4ade80;
      color: #0d0f14;
    }
    button:disabled {
      color: #334155;
      border-color: #252b38;
      cursor: default;
    }
    button:focus-visible {
      outline: 2px solid #fbbf24;
      outline-offset: 2px;
    }
    #progress {
      color: #64748b;
      font-size: 12px;
      margin-left: 8px;
      letter-spacing: 0.05em;
    }
    #hint {
      font-size: 11px;
      color: #fbbf24;
      margin-top: 10px;
      height: 16px;
      letter-spacing: 0.05em;
    }
    /* chart marks */
    .bar {
      fill: #4ade80;
      transition: fill 0.15s;
    }
    .bar:hover { fill: #fbbf24; }
    .line {
      fill: none;
      stroke: #4ade80;
      stroke-width: 2px;
      filter: drop-shadow(0 0 4px rgba(74, 222, 128, 0.5));
    }
    /* axes */
    .tick text { fill: #64748b; font-size: 10px; }
    .tick line { stroke: #252b38; }
    .domain { stroke: #334155; }
    text { font-family: 'JetBrains Mono', monospace; }
    /* annotations */
    .annotation-note-title {
      font-weight: 700;
      font-size: 12px;
      fill: #f472b6 !important;
    }
    .annotation-note-label {
      font-size: 11px;
      fill: #cbd5e1 !important;
    }
    .annotation path {
      stroke: #f472b6;
    }
    .annotation-note-bg { fill: transparent; }
    #tooltip {
      position: absolute;
      background: #0d0f14;
      border: 1px solid #fbbf24;
      padding: 8px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #e2e8f0;
      pointer-events: none;
      opacity: 0;
      border-radius: 2px;
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>

<div id="container">
  <h1>The Rise and Fall of the Video Game Industry</h1>
  <div id="subtitle">Global video game sales, 1980&ndash;2016 &nbsp;|&nbsp; CS 416 Narrative Visualization</div>

  <div id="scene-title"></div>
  <div id="scene-desc"></div>

  <svg id="chart" width="850" height="420"></svg>

  <div id="hint"></div>

  <div id="nav">
    <button id="back">&larr; Back</button>
    <button id="next">Next &rarr;</button>
    <span id="progress"></span>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ===== PARAMETERS (state variables) =====
var currentScene = 0;
var data = [];

var margin = {top: 30, right: 40, bottom: 70, left: 75};
var width = 850 - margin.left - margin.right;
var height = 420 - margin.top - margin.bottom;

// Scene configuration - drives construction of each scene
var scenes = [
  {
    title: "Scene 1: The Industry Boomed, Then Collapsed",
    desc: "Total global sales climbed for nearly three decades, peaked in 2008, and then fell off a cliff.",
    hint: ""
  },
  {
    title: "Scene 2: Action and Sports Drove the Boom",
    desc: "Two genres account for a disproportionate share of all games sold worldwide.",
    hint: ""
  },
  {
    title: "Scene 3: Explore the Platforms",
    desc: "Every console had its era. Hover over any bar to see its total sales.",
    hint: "Tip: hover over any bar for details."
  }
];

// ===== LOAD DATA =====
async function init() {
  var raw = await d3.csv("vgsales.csv");
  // Clean: drop rows with missing/invalid year
  data = raw.filter(function(d) {
    return d.Year && d.Year !== "N/A" && +d.Year >= 1980 && +d.Year <= 2016;
  });
  render();
}

// ===== TRIGGERS =====
d3.select("#next").on("click", function() {
  if (currentScene < scenes.length - 1) { currentScene++; render(); }
});
d3.select("#back").on("click", function() {
  if (currentScene > 0) { currentScene--; render(); }
});

// ===== RENDER (parameter-driven) =====
function render() {
  d3.select("#chart").html("");
  d3.select("#scene-title").text(scenes[currentScene].title);
  d3.select("#scene-desc").text(scenes[currentScene].desc);
  d3.select("#hint").text(scenes[currentScene].hint);
  d3.select("#progress").text("Scene " + (currentScene + 1) + " of " + scenes.length);
  d3.select("#back").attr("disabled", currentScene === 0 ? "true" : null);
  d3.select("#next").attr("disabled", currentScene === scenes.length - 1 ? "true" : null);

  if (currentScene === 0) scene1();
  else if (currentScene === 1) scene2();
  else scene3();
}

function makeGroup() {
  return d3.select("#chart")
    .append("g")
    .attr("transform", "translate(" + margin.left + "," + margin.top + ")");
}

// ===== SCENE 1: Sales by Year (line chart) =====
function scene1() {
  var byYear = d3.nest()
    .key(function(d) { return d.Year; })
    .rollup(function(v) { return d3.sum(v, function(d) { return +d.Global_Sales; }); })
    .entries(data)
    .map(function(d) { return {year: +d.key, sales: d.value}; })
    .sort(function(a, b) { return a.year - b.year; });

  var g = makeGroup();

  var x = d3.scaleLinear()
    .domain(d3.extent(byYear, function(d) { return d.year; }))
    .range([0, width]);

  var y = d3.scaleLinear()
    .domain([0, d3.max(byYear, function(d) { return d.sales; })])
    .range([height, 0]);

  g.append("path")
    .datum(byYear)
    .attr("class", "line")
    .attr("d", d3.line()
      .x(function(d) { return x(d.year); })
      .y(function(d) { return y(d.sales); }));

  g.append("g")
    .attr("transform", "translate(0," + height + ")")
    .call(d3.axisBottom(x).tickFormat(d3.format("d")));

  g.append("g").call(d3.axisLeft(y));

  addAxisLabels(g, "Year", "Global Sales (millions of units)");

  // ANNOTATION
  var peak = byYear.reduce(function(a, b) { return a.sales > b.sales ? a : b; });
  var annotations = [{
    note: {
      title: "Peak: " + peak.year,
      label: d3.format(".0f")(peak.sales) + "M units sold, then a steep decline",
      wrap: 190
    },
    x: x(peak.year),
    y: y(peak.sales),
    dx: 30,
    dy: -40
  }];
  drawAnnotations(g, annotations);
}

// ===== SCENE 2: Sales by Genre (bar chart) =====
function scene2() {
  var byGenre = d3.nest()
    .key(function(d) { return d.Genre; })
    .rollup(function(v) { return d3.sum(v, function(d) { return +d.Global_Sales; }); })
    .entries(data)
    .map(function(d) { return {genre: d.key, sales: d.value}; })
    .sort(function(a, b) { return b.sales - a.sales; });

  var g = makeGroup();

  var x = d3.scaleBand()
    .domain(byGenre.map(function(d) { return d.genre; }))
    .range([0, width])
    .padding(0.2);

  var y = d3.scaleLinear()
    .domain([0, d3.max(byGenre, function(d) { return d.sales; })])
    .range([height, 0]);

  g.selectAll("rect")
    .data(byGenre)
    .enter()
    .append("rect")
    .attr("class", "bar")
    .attr("x", function(d) { return x(d.genre); })
    .attr("y", function(d) { return y(d.sales); })
    .attr("width", x.bandwidth())
    .attr("height", function(d) { return height - y(d.sales); });

  g.append("g")
    .attr("transform", "translate(0," + height + ")")
    .call(d3.axisBottom(x))
    .selectAll("text")
    .attr("transform", "rotate(-40)")
    .style("text-anchor", "end");

  g.append("g").call(d3.axisLeft(y));

  addAxisLabels(g, "", "Global Sales (millions of units)");

  // ANNOTATION
  var top = byGenre[0];
  var annotations = [{
    note: {
      title: top.genre + " leads",
      label: d3.format(".0f")(top.sales) + "M units — the best-selling genre worldwide",
      wrap: 190
    },
    x: x(top.genre) + x.bandwidth() / 2,
    y: y(top.sales),
    dx: 45,
    dy: -25
  }];
  drawAnnotations(g, annotations);
}

// ===== SCENE 3: Sales by Platform (bar chart + tooltips) =====
function scene3() {
  var byPlatform = d3.nest()
    .key(function(d) { return d.Platform; })
    .rollup(function(v) { return d3.sum(v, function(d) { return +d.Global_Sales; }); })
    .entries(data)
    .map(function(d) { return {platform: d.key, sales: d.value}; })
    .sort(function(a, b) { return b.sales - a.sales; })
    .slice(0, 15);

  var g = makeGroup();

  var x = d3.scaleBand()
    .domain(byPlatform.map(function(d) { return d.platform; }))
    .range([0, width])
    .padding(0.2);

  var y = d3.scaleLinear()
    .domain([0, d3.max(byPlatform, function(d) { return d.sales; })])
    .range([height, 0]);

  var tooltip = d3.select("#tooltip");

  g.selectAll("rect")
    .data(byPlatform)
    .enter()
    .append("rect")
    .attr("class", "bar")
    .attr("x", function(d) { return x(d.platform); })
    .attr("y", function(d) { return y(d.sales); })
    .attr("width", x.bandwidth())
    .attr("height", function(d) { return height - y(d.sales); })
    // TRIGGER: hover for details on demand
    .on("mouseover", function(d) {
      tooltip.transition().duration(150).style("opacity", 1);
      tooltip.html("<b>" + d.platform + "</b><br>" +
                   d3.format(".1f")(d.sales) + "M units")
        .style("left", (d3.event.pageX + 12) + "px")
        .style("top", (d3.event.pageY - 28) + "px");
    })
    .on("mouseout", function() {
      tooltip.transition().duration(300).style("opacity", 0);
    });

  g.append("g")
    .attr("transform", "translate(0," + height + ")")
    .call(d3.axisBottom(x))
    .selectAll("text")
    .attr("transform", "rotate(-40)")
    .style("text-anchor", "end");

  g.append("g").call(d3.axisLeft(y));

  addAxisLabels(g, "", "Global Sales (millions of units)");

  // ANNOTATION
  var top = byPlatform[0];
  var annotations = [{
    note: {
      title: top.platform + " on top",
      label: d3.format(".0f")(top.sales) + "M units — hover any bar to compare",
      wrap: 190
    },
    x: x(top.platform) + x.bandwidth() / 2,
    y: y(top.sales),
    dx: 50,
    dy: -25
  }];
  drawAnnotations(g, annotations);
}

function drawAnnotations(g, annotations) {
  var makeAnnotations = d3.annotation()
    .type(d3.annotationCalloutElbow)
    .annotations(annotations);
  g.append("g")
    .attr("class", "annotation-group")
    .style("color", "#f472b6")
    .call(makeAnnotations);
}

function addAxisLabels(g, xLabel, yLabel) {
  if (xLabel) {
    g.append("text")
      .attr("x", width / 2)
      .attr("y", height + 45)
      .style("text-anchor", "middle")
      .style("font-size", "11px")
      .style("fill", "#64748b")
      .text(xLabel);
  }
  g.append("text")
    .attr("transform", "rotate(-90)")
    .attr("x", -height / 2)
    .attr("y", -55)
    .style("text-anchor", "middle")
    .style("font-size", "11px")
    .style("fill", "#64748b")
    .text(yLabel);
}

if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(init);
} else {
  init();
}
</script>

</body>
</html>
